<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Screenshot Select</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; cursor: crosshair; background: transparent; }
    #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
    #selection {
      position: absolute;
      border: 2px dashed #89B4FA;
      background: rgba(137, 180, 250, 0.08);
      pointer-events: none;
      display: none;
    }
    #info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text-dim);
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="bg" src="" alt="" />
  <div id="selection"></div>
  <div id="info" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#FFF;font-size:13px;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,0.5);">Drag to select area | Esc to cancel</div>

  <script src="js/screenshot-select.js"></script>
</body>
</html>
