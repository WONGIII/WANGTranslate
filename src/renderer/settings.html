<!DOCTYPE html>
<html lang="en">
<head>

<body class="window-frame">

      <span class="title-text">WANGTranslate <span data-i18n="settings.title">Settings</span></span>
      <div class="win-controls">
        <button class="win-btn close" id="closeBtn"></button>
      </div>
    </div>

    <div class="window-body">
      <div class="settings-layout" style="height:100%;">
        <div class="nav-rail">
          <div style="padding: 6px 12px; margin-bottom: 10px;">
            <div style="font-size:14px;font-weight:700;color:var(--text);" data-i18n="app.name">WANGTranslate</div>
          </div>
          <div class="nav-item active" data-page="general">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span data-i18n="settings.general">General</span>
          </div>
          <div class="nav-item" data-page="shortcuts">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M6 16h.01M10 16h.01M6 12h.01"/></svg>
            <span data-i18n="settings.shortcuts">Shortcuts</span>
          </div>
          <div class="nav-item" data-page="api">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9H3m9 9a9 9 0 0 1-9-9m9 9c1.66 0 3-4.03 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4.03-3-9s1.34-9 3-9m-9 9a9 9 0 0 1 9-9"/></svg>
            <span data-i18n="settings.api">API</span>
          </div>
          <div class="nav-item" data-page="ocr">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span data-i18n="settings.ocr">OCR</span>
          </div>
        </div>
        <div class="settings-content" id="pageContainer"></div>
      </div>
    </div>
  <script src="js/i18n.js"></script>
  <script src="js/settings.js"></script>
</body>
</html>
