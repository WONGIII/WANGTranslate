<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WANGTranslate</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="overlay-body">
    <div class="header">
      <span id="sourceText" style="font-size:12px;color:var(--text-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
      <button class="close-btn" id="closeBtn">&times;</button>
    </div>
    <div class="content" id="results">
      <div class="spinner" id="loading"></div>
    </div>
  </div>
  <script src="js/i18n.js"></script>
  <script src="js/translate-overlay.js"></script>
</body>
</html>
